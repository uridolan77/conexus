project_name: "Conexus"
project_type: "LLM gateway and back-office platform"
primary_language: "Python and TypeScript"
primary_stack:
  frontend: "Next.js 14 back-office frontend"
  backend: "FastAPI LLM gateway and admin API"
  database: "PostgreSQL"
  cloud: "Docker Compose locally; Vercel plus container host in deployment docs"
source_of_truth:
  product: ["docs/product/conexus-v0-scope.md"]
  architecture: ["docs/architecture/architecture-principles.md"]
  specs: ["docs/specs/provider-abstraction.md", "docs/specs/reasons-canvas.md"]
validation:
  install:
    - "python -m pip install -e ./backend[dev]"
    - "python -m pip install -e ./agentor[dev]"
    - "npm --prefix frontend install"
  lint:
    - "python -m ruff check backend agentor"
    - "npm --prefix frontend run lint"
  typecheck:
    - "python -m mypy backend/app"
  test:
    - "python -m pytest backend/tests"
    - "python -m pytest agentor/tests"
    - "npm --prefix frontend run test"
  build:
    - "npm --prefix frontend run build"
