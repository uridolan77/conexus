blocked_commands:
  - "rm -rf /"
  - "rm -rf ~"
  - "sudo rm"
  - "git push --force"
  - "git reset --hard"
  - "git clean -fdx"
  - "chmod -R 777"
  - "docker system prune"
  - "kubectl delete"
  - "terraform destroy"
ask_before_commands:
  - "git commit"
  - "git push"
  - "git rebase"
  - "npm install"
  - "pnpm add"
  - "dotnet add package"
  - "pip install"
  - "database migration"
  - "docker compose down -v"
  - "alembic downgrade"
