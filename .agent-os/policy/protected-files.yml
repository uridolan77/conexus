protected_paths:
  secrets:
    - ".env"
    - ".env.*"
    - "*.pem"
    - "*.key"
    - "*.p12"
    - "*.pfx"
    - "id_rsa"
    - "id_ed25519"
    - "secrets.*"
    - "appsettings.Production.json"
  governance_docs:
    - "AGENTS.md"
    - "CLAUDE.md"
    - "GEMINI.md"
    - ".github/copilot-instructions.md"
    - ".agent-os/"
    - "docs/product/"
    - "docs/architecture/"
    - "docs/specs/"
    - "docs/00_START_HERE.md"
    - "docs/01_KGB_REUSE_PLAN.md"
    - "docs/02_MILESTONES.md"
    - "docs/03_ARCHITECTURE.md"
    - "docs/04_GATEWAY.md"
    - "docs/05_BACK_OFFICE.md"
    - "docs/06_DEPLOYMENT.md"
bypass:
  environment_variable: "ALLOW_AGENT_OS_PROTECTED_EDIT"
  accepted_value: "1"
