services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conexus
      POSTGRES_PASSWORD: conexus
      POSTGRES_DB: conexus
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - conexus_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conexus -d conexus"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "1",
      ]
    environment:
      APP_ENV: ${APP_ENV:-local}
      WEB_CONCURRENCY: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://conexus:conexus@postgres:5432/conexus}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://localhost:8000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-local-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-12}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (set it in .env)}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gateway}
      INTERNAL_ADAPTER_API_KEY: ${INTERNAL_ADAPTER_API_KEY:-localdev-internal-key-change-before-prod-123456}
      ADAPTER_PROFILE_REGISTRY_ENABLED: ${ADAPTER_PROFILE_REGISTRY_ENABLED:-true}
      ADAPTER_PROFILE_OBSERVABILITY_ENABLED: ${ADAPTER_PROFILE_OBSERVABILITY_ENABLED:-true}
      ADAPTER_PROFILE_CANARY_ROUTING_ENABLED: ${ADAPTER_PROFILE_CANARY_ROUTING_ENABLED:-false}
      ADAPTATION_API_BASE_URL: ${ADAPTATION_API_BASE_URL:-http://host.docker.internal:5000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5).read()",
        ]
      interval: 5s
      timeout: 6s
      retries: 6
      start_period: 25s

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_BASE_URL: http://backend:8000
      NEXT_PUBLIC_BACKEND_BASE_URL: ${NEXT_PUBLIC_BACKEND_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  conexus_pg:
