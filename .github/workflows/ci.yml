name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Typecheck (mypy) (non-blocking for now)
        continue-on-error: true
        run: mypy app
      - name: Lint
        run: ruff check app tests
      - name: Test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Test
        run: npm test -- --run
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  agentor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Test
        run: pytest -q
